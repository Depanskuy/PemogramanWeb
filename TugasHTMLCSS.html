<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>
    <link rel="stylesheet" href="TugasHTMLCSS.html">
</head>

<body>
<style>
    body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f8f6f6;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: linear-gradient(180deg, #d6d8e1, #0b0b0b);
    padding: 20px;
    border-radius: 15px;
    width: 280px;
    text-align: center;
    color: rgb(18, 17, 17);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.profile-img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    
}

.desc {
    font-size: 12px;
    margin-bottom: 15px;
}

.tombol {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.btn {
    text-decoration: none;
    background: #0eb5e4;
    padding: 10px;
    border-radius: 8px;
    color: rgb(18, 17, 17);
    font-size: 14px;
    transition: 0.3s;
}
.connect-yuk{
    background-color: rgb(241, 10, 10);

}
.btn:hover {
    background: #edecea;
}

.KataKata-Hariini {
    width: 70%;
    border-radius: 20px;
    margin: 0;
    align-items: center;
}

small {
    font-size: 11px;
    opacity: 0.8;
}
</style>
<div class="container">
    <div class="card">

        <img src="https://i.pinimg.com/736x/43/94/5e/43945ea1c531a7e5008f10fd4ed91fed.jpg" class="profile-img">

        <h2>Depaskuy</h2>
        <p class="desc">Depa adalah anak baik,tidak sombong dan rajin menabung</p>

        <div class="tombol">
            <a href="https://github.com/Depanskuy" class="btn btn">GitHub</a>
            <a href="https://www.linkedin.com/in/syalvan-depaskuy-3321443bb/" class="btn">LinkedIn</a>
            <a href="https://www.instagram.com/depadn_/" class="btn btn">Instagram</a>
            <a href="" class="btn connect-yuk">Conect yukk</a>
        </div>

        <div class="content">
            <h4>Wong liyo ngertos what</h4>
            <img src="https://i.pinimg.com/736x/c3/32/b7/c332b7f3c143d7fd27821dfd224c9650.jpg" class="KataKata-Hariini">

            <p></p>
            <small>lihat kemari</small>
        </div>

    </div>
</div>

</body>
</html>
